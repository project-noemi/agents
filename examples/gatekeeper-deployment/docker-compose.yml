# Fetch-on-Demand: All secrets are injected at runtime via vault CLI wrappers.
# Usage:  op run --env-file=.env.example -- docker compose up -d
#    or:  infisical run --env=dev -- docker compose up -d
# See .env.example for required variable names.

# Project NoéMI: Gatekeeper + Fleet Dashboard Deployment
# Includes the Gatekeeper PR triage agent, Fleet Dashboard (Grafana + InfluxDB),
# and a Slack alert relay.

services:
  # --------------------------------------------------------
  # TIME-SERIES STORE
  # Stores agent triage reports for dashboard queries
  # --------------------------------------------------------
  influxdb:
    image: influxdb:2.7
    container_name: fleet-influxdb
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=noemi
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=noemi
      - DOCKER_INFLUXDB_INIT_BUCKET=agent_reports
      - DOCKER_INFLUXDB_INIT_RETENTION=90d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - gatekeeper-net
    restart: unless-stopped

  # --------------------------------------------------------
  # FLEET DASHBOARD (Grafana)
  # Central observability UI for all NoéMI agents
  # --------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: fleet-dashboard
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - gatekeeper-net
    restart: unless-stopped

  dashboard-ingest:
    image: node:20-alpine
    container_name: fleet-dashboard-ingest
    working_dir: /app
    command: ["node", "dashboard-ingest.js"]
    environment:
      - PORT=8081
      - DASHBOARD_API_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - GATEKEEPER_HMAC_SECRET=${GATEKEEPER_HMAC_SECRET}
      - INFLUXDB_WRITE_URL=http://influxdb:8086/api/v2/write?org=noemi&bucket=agent_reports&precision=ns
      - INFLUXDB_AUTH_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    volumes:
      - ./dashboard-ingest.js:/app/dashboard-ingest.js:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8081/health').then((res) => process.exit(res.status === 200 ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - gatekeeper-net
    restart: unless-stopped

  # --------------------------------------------------------
  # GATEKEEPER AGENT
  # Runs on a schedule, triages PRs, posts reports
  # --------------------------------------------------------
  gatekeeper:
    image: ghcr.io/noemi/gatekeeper-agent:1.0.0
    build:
      context: .
      dockerfile: Dockerfile.gatekeeper
    container_name: gatekeeper-agent
    environment:
      - GH_TOKEN=${GH_TOKEN}
      - GATEKEEPER_ORG=${GATEKEEPER_ORG}
      - GATEKEEPER_REPOS=${GATEKEEPER_REPOS:-}
      - GATEKEEPER_DRY_RUN=${GATEKEEPER_DRY_RUN:-true}
      - GATEKEEPER_INTERVAL_HOURS=${GATEKEEPER_INTERVAL_HOURS:-4}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - DASHBOARD_API_URL=http://dashboard-ingest:8081/api/v1/reports
      - DASHBOARD_AUTH_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - GATEKEEPER_HMAC_SECRET=${GATEKEEPER_HMAC_SECRET}
    depends_on:
      dashboard-ingest:
        condition: service_healthy
    networks:
      - gatekeeper-net
    restart: unless-stopped

  # --------------------------------------------------------
  # ALERT RELAY
  # Monitors agent health and forwards alerts to Slack
  # --------------------------------------------------------
  alert-relay:
    image: curlimages/curl:8.11.1
    container_name: fleet-alert-relay
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        # Validate required environment variables
        if [ -z "$${SLACK_WEBHOOK_URL:-}" ]; then
          echo "ERROR: SLACK_WEBHOOK_URL is not set. Exiting." >&2
          exit 1
        fi
        if [ -z "$${INFLUXDB_ADMIN_TOKEN:-}" ]; then
          echo "ERROR: INFLUXDB_ADMIN_TOKEN is not set. Exiting." >&2
          exit 1
        fi
        echo "Alert relay started. Checking every 30 minutes."
        # Health check loop — checks every 30 minutes
        while true; do
          # Query InfluxDB for agents that haven't reported recently
          STALE=$(curl -sf --max-time 30 "http://influxdb:8086/api/v2/query?org=noemi" \
            -H "Authorization: Token $${INFLUXDB_ADMIN_TOKEN}" \
            -H "Content-Type: application/vnd.flux" \
            -d 'from(bucket: "agent_reports")
              |> range(start: -6h)
              |> filter(fn: (r) => r._measurement == "cycle_report")
              |> group(columns: ["agent_id"])
              |> last()
              |> filter(fn: (r) => int(v: now()) - int(v: r._time) > 21600000000000)' \
            2>/dev/null) || { echo "$(date -u) WARNING: Failed to query InfluxDB" >&2; sleep 1800; continue; }
          if [ -n "$$STALE" ]; then
            curl -sf --max-time 30 -X POST "$${SLACK_WEBHOOK_URL}" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"⚠️ Fleet Dashboard Alert: One or more agents have not reported in the expected window. Check the dashboard at http://localhost:3000\"}" \
              || echo "$(date -u) WARNING: Failed to post alert to Slack" >&2
          fi
          sleep 1800
        done
    environment:
      - INFLUXDB_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - gatekeeper-net
    restart: unless-stopped

volumes:
  influxdb-data:
  grafana-data:

networks:
  gatekeeper-net:
    driver: bridge
