name: Validate Reference Architecture

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-fast:
    name: Audit, Generate, and Fast Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Node toolchain versions
        run: |
          node --version
          npm --version

      - name: Run repository audit
        run: npm run audit

      - name: Run fast validation suite
        run: npm test

      - name: Regenerate context outputs
        run: npm run generate

      - name: Check generated context freshness
        run: |
          if ! git diff --exit-code -- GEMINI.md CLAUDE.md; then
            echo "::error::Generated context is stale. Run 'node scripts/generate_all.js' and commit the result."
            exit 1
          fi

  docker-smoke:
    name: Docker Smoke Validation
    needs: validate-fast
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Run Docker smoke suite
        run: npm run test:e2e

      - name: Upload Docker smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-smoke-diagnostics
          path: test-artifacts/docker-smoke
          if-no-files-found: ignore
