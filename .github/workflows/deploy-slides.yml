name: Deploy Slides to GitHub Pages

on:
  push:
    branches: [develop]
    paths:
      - 'presentations/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: presentations
        run: npm install

      - name: Build slides
        working-directory: presentations
        run: npx slidev build slides.md --base /agents/presentations/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: presentations/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
