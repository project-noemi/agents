# Fetch-on-Demand: All secrets are injected at runtime via vault CLI wrappers.
# Usage:  op run --env-file=.env.example -- docker compose up -d
#    or:  infisical run --env=dev -- docker compose up -d
# See .env.example for required variable names.

# Project NoéMI: Fleet Deployment Infrastructure (Docker Compose)
# This simulates the multi-tenant architecture for running 10 parallel boot camp cohorts.
# It includes Traefik for routing, a centralized logging stack (Grafana/Loki), 
# and isolated orchestrator instances (n8n).

services:
  # --------------------------------------------------------
  # THE INGRESS LAYER
  # Routes traffic securely to the distinct cohort environments
  # --------------------------------------------------------
  traefik:
    image: traefik:v2.10
    container_name: fleet-traefik
    command:
      - "--api.insecure=true"          # SECURITY: Replace with --api.dashboard=true + auth middleware in production
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      # PRODUCTION: Add TLS entrypoint:
      # - "--entrypoints.websecure.address=:443"
      # - "--certificatesresolvers.letsencrypt.acme.email=admin@example.com"
      # - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "8080:8080" # Traefik Dashboard — PRODUCTION: Remove or restrict to internal network
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - noemi-fleet-net

  # --------------------------------------------------------
  # THE IDENTITY LAYER (Casdoor)
  # Standardized identity provider for all multi-tenant stacks
  # --------------------------------------------------------
  db-casdoor:
    image: postgres:16
    container_name: fleet-db-casdoor
    environment:
      - POSTGRES_USER=casdoor
      - POSTGRES_PASSWORD=${CASDOOR_DB_PASSWORD}
      - POSTGRES_DB=casdoor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casdoor -d casdoor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noemi-fleet-net

  casdoor:
    image: casbin/casdoor:2.377.0
    container_name: fleet-casdoor
    environment:
      - driverName=postgres
      - dataSourceName=user=casdoor password=${CASDOOR_DB_PASSWORD} host=db-casdoor port=5432 sslmode=disable dbname=casdoor  # PRODUCTION: Change to sslmode=require with proper certificates
    depends_on:
      db-casdoor:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - noemi-fleet-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.casdoor.rule=Host(`auth.noemi.local`)"

  # --------------------------------------------------------
  # THE CENTRAL OBSERVABILITY STACK
  # Used by Master Accelerators to audit logs across all cohorts
  # --------------------------------------------------------
  loki:
    image: grafana/loki:3.4.2
    container_name: fleet-loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - noemi-fleet-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: fleet-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - noemi-fleet-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`audit.noemi.local`)"

  # --------------------------------------------------------
  # COHORT 01 (Isolated Namespace Example)
  # Each cohort gets an isolated orchestrator and Postgres DB
  # --------------------------------------------------------
  db-cohort01:
    image: postgres:16
    container_name: fleet-db-cohort01
    environment:
      - POSTGRES_USER=cohort01
      - POSTGRES_PASSWORD=${COHORT01_DB_PASSWORD}
      - POSTGRES_DB=n8n_cohort01
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cohort01 -d n8n_cohort01"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noemi-fleet-net

  n8n-cohort01:
    image: docker.n8n.io/n8nio/n8n:1.76.1
    container_name: fleet-n8n-cohort01
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db-cohort01
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_cohort01
      - DB_POSTGRESDB_USER=cohort01
      - DB_POSTGRESDB_PASSWORD=${COHORT01_DB_PASSWORD}
      - N8N_HOST=cohort01.noemi.local
      - WEBHOOK_URL=http://cohort01.noemi.local
    depends_on:
      db-cohort01:
        condition: service_healthy
    networks:
      - noemi-fleet-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n-cohort01.rule=Host(`cohort01.noemi.local`)"

  # --------------------------------------------------------
  # COHORT 02 (Isolated Namespace Example)
  # --------------------------------------------------------
  db-cohort02:
    image: postgres:16
    container_name: fleet-db-cohort02
    environment:
      - POSTGRES_USER=cohort02
      - POSTGRES_PASSWORD=${COHORT02_DB_PASSWORD}
      - POSTGRES_DB=n8n_cohort02
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cohort02 -d n8n_cohort02"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - noemi-fleet-net

  n8n-cohort02:
    image: docker.n8n.io/n8nio/n8n:1.76.1
    container_name: fleet-n8n-cohort02
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db-cohort02
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_cohort02
      - DB_POSTGRESDB_USER=cohort02
      - DB_POSTGRESDB_PASSWORD=${COHORT02_DB_PASSWORD}
      - N8N_HOST=cohort02.noemi.local
      - WEBHOOK_URL=http://cohort02.noemi.local
    depends_on:
      db-cohort02:
        condition: service_healthy
    networks:
      - noemi-fleet-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n-cohort02.rule=Host(`cohort02.noemi.local`)"

networks:
  noemi-fleet-net:
    driver: bridge
